name: Refresh Price Watches

on:
  schedule:
    - cron: "0 6 * * *" # 6am UTC daily
  workflow_dispatch: # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Google Chrome
        run: npx playwright install --with-deps chrome

      - name: Check IP before VPN
        run: echo "Pre-VPN IP $(curl -s https://api.ipify.org)"

      - name: Connect to home VPN
        run: |
          echo "${{ secrets.OVPN_CONFIG }}" > /tmp/vpn.ovpn
          sudo apt-get install -y openvpn
          sudo openvpn --config /tmp/vpn.ovpn --log /tmp/vpn.log &
          VPN_PID=$!
          # Wait up to 30s for the tunnel to come up
          for i in $(seq 1 30); do
            sleep 1
            if sudo grep -q "Initialization Sequence Completed" /tmp/vpn.log 2>/dev/null; then
              echo "VPN connected after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "VPN failed to connect after 30s"
              sudo cat /tmp/vpn.log 2>/dev/null || echo "(no log file)"
              kill $VPN_PID 2>/dev/null || true
              rm -f /tmp/vpn.ovpn
              exit 1
            fi
          done
          rm -f /tmp/vpn.ovpn
          sudo cat /tmp/vpn.log

      - name: Check IP after VPN
        run: echo "Post-VPN IP $(curl -s https://api.ipify.org)"

      - name: Run price watch refresh (with XVFB)
        run: xvfb-run npx tsx src/workers/refresh-price-watches.ts
        env:
          # Screenshots on failure land in the working directory (uploaded as artifact below)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
          NEXT_PUBLIC_AXIOM_DATASET: ${{ vars.NEXT_PUBLIC_AXIOM_DATASET }}
          CI: true

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyatt-failure-screenshots
          path: hyatt-*.png
          if-no-files-found: ignore
