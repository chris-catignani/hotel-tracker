name: Refresh Price Watches

on:
  schedule:
    - cron: "0 2,8,14,20 * * *" # every 6 hours; active-hours check gates actual execution
  workflow_dispatch: # allow manual trigger

jobs:
  check-hours:
    runs-on: [self-hosted, Windows, X64]
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - name: Check active hours
        id: check
        shell: pwsh
        run: |
          $hour = (Get-Date).Hour
          $active = ($hour -ge 9 -and $hour -le 22).ToString().ToLower()
          "active=$active" >> $env:GITHUB_OUTPUT
          Write-Host "Local hour: $hour — active: $active"

  refresh:
    needs: check-hours
    if: needs.check-hours.outputs.active == 'true'
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Run price watch refresh
        shell: pwsh
        run: npx tsx src/workers/refresh-price-watches.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
          NEXT_PUBLIC_AXIOM_DATASET: ${{ vars.NEXT_PUBLIC_AXIOM_DATASET }}
          CI: true

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hyatt-failure-screenshots
          path: hyatt-*.png
          if-no-files-found: ignore
