name: Ingest Chain Directory

on:
  schedule:
    - cron: "0 2 1 * *" # 2am UTC on the 1st of each month
  workflow_dispatch: # allow manual trigger
    inputs:
      chain:
        description: "Chain to ingest (gha or hyatt)"
        required: true
        default: "gha"
      limit:
        description: "Max properties to fetch page details for (omit for full run, gha only)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        if: ${{ github.event.inputs.chain == 'gha' || github.event_name == 'schedule' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: ${{ github.event.inputs.chain == 'gha' || github.event_name == 'schedule' }}
        run: npx playwright install --with-deps chromium

      - name: Run chain directory ingest
        run: ${{ (github.event.inputs.chain == 'gha' || github.event_name == 'schedule') && 'xvfb-run' || '' }} npx tsx src/workers/ingest-chain-directory.ts
        env:
          CHAIN: ${{ github.event.inputs.chain || 'gha' }}
          LIMIT: ${{ github.event.inputs.limit }}
          RUNNER_TYPE: remote
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
          NEXT_PUBLIC_AXIOM_DATASET: ${{ vars.NEXT_PUBLIC_AXIOM_DATASET }}
          CI: true
